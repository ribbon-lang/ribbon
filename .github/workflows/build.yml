on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - "**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎
        uses: actions/checkout@v3
      - name: Setup Java 17 ☕
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17
      - name: Compile and run tests 👷
        run: ./gradlew build
